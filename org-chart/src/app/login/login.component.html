<!-- Show maintenance page when server is down -->
<div *ngIf="showMaintenancePage" class="maintenance-overlay">
  <app-maintenance></app-maintenance>
  <button mat-icon-button class="close-maintenance" (click)="hideMaintenance()" title="Back to Login">
    <mat-icon>close</mat-icon>
  </button>
</div>

<!-- Normal login form -->
<div class="login-container" [class.hidden]="showMaintenancePage">
  <img src="assets/highspring-logo.png" alt="Highspring Logo" class="logo">
  <h2>Welcome Back!</h2>
  <p class="login-subtitle">Sign in to continue to your dashboard</p>

  <form (ngSubmit)="onSubmit()">
    <mat-form-field class="custom-field">
      <mat-label>UserId</mat-label>
      <input matInput [(ngModel)]="username" name="username" required placeholder="Enter your LDAP" autofocus />
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>

    <mat-form-field class="custom-field">
      <mat-label>Password</mat-label>
      <input matInput [(ngModel)]="password" name="password" type="{{ hidePassword ? 'password' : 'text' }}" required
        placeholder="Enter your password" />
      <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <!-- Role selection removed for security reasons -->
    <!-- The backend will determine the user's role based on their account -->

    <div class="buttons">
      <button mat-raised-button color="primary" type="submit" class="action-button">Login</button>
    </div>

    <div class="forgot-password">
      <a routerLink="/forgot-password" class="link">Forgot Password?</a>
    </div>
  </form>
  <!-- <p class="footer-text">Don't have an account? <a routerLink="/signup" class="link">Sign up here</a>.</p> -->
</div>
