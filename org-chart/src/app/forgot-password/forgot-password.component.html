<div class="forgot-password-container">
  <img src="assets/highspring-logo.png" alt="Highspring Logo" class="logo">
  <h2>Forgot Password</h2>
  <p class="subtitle">Enter your username to receive a password reset code</p>

  <form (ngSubmit)="onSubmit()">
    <mat-form-field class="custom-field">
      <mat-label>Username</mat-label>
      <input matInput [(ngModel)]="username" name="username" required placeholder="Enter your username" autofocus />
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>

    <div class="buttons">
      <button mat-raised-button color="primary" type="submit" class="action-button" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Send Reset Code</span>
        <span *ngIf="isSubmitting">Sending...</span>
      </button>
    </div>

    <div class="back-to-login">
      <a routerLink="/login" class="link">Back to Login</a>
    </div>
  </form>
</div>
