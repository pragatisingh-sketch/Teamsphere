<h2 mat-dialog-title>Delegate Role</h2>
<mat-dialog-content>
    <p>Delegate your <strong>{{data.currentRole}}</strong> role to another user.</p>

    <form [formGroup]="delegationForm">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Select Delegatee</mat-label>
            <mat-select formControlName="delegateeLdap">
                <mat-option *ngFor="let user of users" [value]="user.ldap">
                    {{user.firstName}} {{user.lastName}} ({{user.ldap}})
                </mat-option>
            </mat-select>
            <mat-error *ngIf="delegationForm.get('delegateeLdap')?.hasError('required')">
                Delegatee is required
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Start Date</mat-label>
            <input matInput [matDatepicker]="startPicker" formControlName="startDate">
            <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
            <mat-datepicker #startPicker></mat-datepicker>
            <mat-error *ngIf="delegationForm.get('startDate')?.hasError('required')">
                Start date is required
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>End Date</mat-label>
            <input matInput [matDatepicker]="endPicker" formControlName="endDate">
            <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
            <mat-error *ngIf="delegationForm.get('endDate')?.hasError('required')">
                End date is required
            </mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="delegationForm.invalid || loading">
        {{ loading ? 'Delegating...' : 'Delegate' }}
    </button>
</mat-dialog-actions>
